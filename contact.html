<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EnergyM | Contact</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #05080f;
  color: white;
}

/* Reveal scroll animation */
.reveal {
  opacity: 0;
  transform: translateY(40px);
  transition: .9s ease;
}
.reveal.show {
  opacity: 1;
  transform: translateY(0);
}

/* Form hover/focus effects */
input, textarea {
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.1);
  transition: all 0.3s ease;
}
input:focus, textarea:focus {
  outline: none;
  border-color: #22d3ee;
  box-shadow: 0 0 10px rgba(34,211,238,0.4);
}
button:hover {
  transform: scale(1.05);
}
</style>
</head>

<body class="bg-[#05080f] text-white">

<!-- NAVBAR -->
<div id="navbar-container"></div>

<!-- HERO -->
<section class="pt-32 pb-12 text-center reveal">
  <h1 class="text-4xl md:text-5xl font-bold text-cyan-400 mb-4">Get in Touch</h1>
  <p class="text-gray-400 max-w-xl mx-auto">Have questions or want a personalized training plan? Drop us a message and our team will respond quickly.</p>
</section>

<!-- CONTACT FORM -->
<section class="max-w-xl mx-auto px-6 reveal">
  <form class="bg-[#0b1220] p-8 rounded-2xl border border-white/10 shadow-lg space-y-6">
    <input type="text" placeholder="Your Name" class="w-full p-4 rounded-xl text-white placeholder-gray-400">
    <input type="email" placeholder="Email" class="w-full p-4 rounded-xl text-white placeholder-gray-400">
    <textarea placeholder="Message" rows="5" class="w-full p-4 rounded-xl text-white placeholder-gray-400"></textarea>
    <button class="w-full bg-cyan-400 text-black py-3 rounded-full font-semibold transition-transform">
      Send Message
    </button>
  </form>
</section>

<!-- FOOTER -->
<div id="footer-container" class="mt-20"></div>

<!-- JS -->
<script src="main.js"></script>

<!-- JS -->
<script>
// Load navbar and footer
fetch('navbar.html')
  .then(res => res.text())
  .then(data => document.getElementById('navbar-container').innerHTML = data);
fetch('footer.html')
  .then(res => res.text())
  .then(data => document.getElementById('footer-container').innerHTML = data);

// Scroll reveal
const reveals = document.querySelectorAll(".reveal");
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting) entry.target.classList.add("show");
  });
},{ threshold: 0.15 });
reveals.forEach(el => observer.observe(el));
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EnergyM | Trainers</title>

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #05080f;
  color: white;
}

/* Trainer card hover */
.trainer-card {
  transition: transform 0.4s ease, box-shadow 0.4s ease;
}
.trainer-card:hover {
  transform: translateY(-10px) scale(1.03);
  box-shadow: 0 20px 40px rgba(34, 211, 238, 0.25);
}

/* Reveal animation */
.reveal {
  opacity: 0;
  transform: translateY(40px);
  transition: 0.9s ease;
}
.reveal.show {
  opacity: 1;
  transform: translateY(0);
}
</style>
</head>

<body>

<div id="navbar-container"></div>

    <!-- Duplicate Trainer Cards with different images & names -->

      <div class="w-full h-48 overflow-hidden">
        <img src="https://images.unsplash.com/photo-1607746882042-944635dfe10f?auto=format&fit=crop&w=400&q=80" 
             alt="Neha Singh" 
             class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105">
      </div>
      <div class="p-4">
        <h3 class="text-lg font-semibold mb-1">Neha Singh</h3>
        <p class="text-gray-400 text-sm mb-2">Fitness Trainer</p>
      </div>
      <div class="absolute inset-0 bg-black/50 flex items-center justify-center gap-3 opacity-0 group-hover:opacity-100 transition-opacity">
        <a href="#" class="text-white w-8 h-8 flex items-center justify-center rounded-full bg-cyan-400 hover:bg-cyan-500 transition">

        <a href="#" class="text-white w-8 h-8 flex items-center justify-center rounded-full bg-cyan-400 hover:bg-cyan-500 transition">

          <i class="fab fa-instagram"></i>

    <!-- Add remaining 7 cards similarly -->

      <div class="w-full h-48 overflow-hidden">

             alt="Aman Khan"

      </div>
      <div class="p-4">
        <h3 class="text-lg font-semibold mb-1">Aman Khan</h3>
        <p class="text-gray-400 text-sm mb-2">CrossFit Expert</p>
      </div>

    <!-- Continue duplicating for remaining trainers (total 9 cards) -->

<!-- Font Awesome CDN (for social icons) -->
<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>

<!-- FOOTER -->
<div id="footer-container"></div>

<!-- JS -->
<script src="main.js"></script>

<!-- JS -->
<script src="main.js"></script>

<!-- JS -->
<script>

/* Load Navbar */
fetch('../navbar.html')   // instead of './navbar.html'
  .then(r => r.text())
  .then(d => {
    document.getElementById('navbar-container').innerHTML = d;
  });

/* Load Footer */
fetch('../footer.html')   // instead of './footer.html'
  .then(r => r.text())
  .then(d => {
    document.getElementById('footer-container').innerHTML = d;
  });

/* Scroll reveal */
const reveals=document.querySelectorAll(".reveal");
const observer=new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting) entry.target.classList.add("show");
  });
},{threshold:.15});
reveals.forEach(el=>observer.observe(el));
</script>

<!-- Font Awesome -->
<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>

</body>
</html>
